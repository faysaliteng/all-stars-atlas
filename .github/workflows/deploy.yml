name: Deploy Seven Trip to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/projects/all-stars-atlas
            git pull origin main

            # Frontend
            npm install
            npm run build
            sudo rm -rf /var/www/seventrip/*
            sudo cp -r dist/* /var/www/seventrip/
            sudo chown -R www-data:www-data /var/www/seventrip

            # Backend
            cd backend
            npm install
            pm2 restart seventrip-api

            echo "✅ Seven Trip deployed successfully!"
